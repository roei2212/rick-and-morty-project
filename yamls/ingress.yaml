apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rick-and-morty-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: rick.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rick-and-morty-service
                port:
                  number: 8000